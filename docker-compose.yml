services:

    db:
      image: postgres:15.5
      container_name: my_postgres
      environment:
        POSTGRES_DB: back_end_order_db
        POSTGRES_USER: admin
        POSTGRES_PASSWORD: 123456
      ports:
        - "5432:5432"

    redis:
      image: redis:7.4.8
      container_name: my_redis
      ports:
        - "6379:6379"